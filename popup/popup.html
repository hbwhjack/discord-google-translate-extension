<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JB Discord Translate</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
      body { margin: 0; width: 320px; background: #111318; color: #f3f4f6; }
      main { padding: 16px; }
      h1 { margin: 0 0 6px; font-size: 18px; }
      p { color: #c4cad6; font-size: 13px; line-height: 1.5; }
      .card { background: #1a1f29; border: 1px solid #2b3342; border-radius: 14px; padding: 14px; margin-top: 12px; }
      label { display: block; font-weight: 600; margin-bottom: 8px; }
      select, button { width: 100%; border-radius: 10px; border: 1px solid #3b465a; background: #0f141d; color: #f3f4f6; font: inherit; box-sizing: border-box; }
      select, button { padding: 10px 12px; }
      .toggle { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .toggle input { width: 18px; height: 18px; }
      .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
      button.primary { background: #2563eb; border-color: #2563eb; }
      button.secondary { background: #0f141d; }
      #popup-status { margin-top: 10px; min-height: 20px; color: #f5d547; font-size: 13px; }
    </style>
  </head>
  <body>
    <main>
      <h1>JB Discord Translate</h1>
      <p>常用设置放这儿，细项去完整设置页。</p>

      <section class="card">
        <label for="popup-target-language">Target language</label>
        <select id="popup-target-language">
          <option value="zh-CN">简体中文 (zh-CN)</option>
          <option value="zh-TW">繁體中文 (zh-TW)</option>
          <option value="ja">日本語 (ja)</option>
          <option value="en">English (en)</option>
          <option value="ko">한국어 (ko)</option>
          <option value="fr">Français (fr)</option>
          <option value="de">Deutsch (de)</option>
        </select>
      </section>

      <section class="card toggle">
        <div>
          <label for="popup-translate-direct-messages">Translate direct messages</label>
        </div>
        <input id="popup-translate-direct-messages" type="checkbox" />
      </section>

      <div class="actions">
        <button id="popup-save" class="primary" type="button">Save</button>
        <button id="open-full-settings" class="secondary" type="button">Open full settings</button>
      </div>
      <div id="popup-status" aria-live="polite"></div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
