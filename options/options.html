<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JB Discord Translate Settings</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
      body { margin: 0; background: #111318; color: #f3f4f6; }
      main { max-width: 820px; margin: 0 auto; padding: 32px 20px 40px; }
      h1 { margin: 0 0 8px; font-size: 28px; }
      p { color: #c4cad6; line-height: 1.6; }
      .card { background: #1a1f29; border: 1px solid #2b3342; border-radius: 16px; padding: 20px; margin-top: 20px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
      label { display: block; font-weight: 600; margin-bottom: 8px; }
      select, textarea, button, input[type="file"] { border-radius: 10px; border: 1px solid #3b465a; background: #0f141d; color: #f3f4f6; font: inherit; }
      select, textarea, input[type="file"] { width: 100%; padding: 10px 12px; box-sizing: border-box; }
      textarea { min-height: 110px; resize: vertical; }
      .toggle-row { display: flex; gap: 12px; align-items: center; justify-content: space-between; }
      .toggle-row input { width: 20px; height: 20px; }
      .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
      button { padding: 10px 14px; cursor: pointer; }
      button.primary { background: #2563eb; border-color: #2563eb; }
      button.danger { background: #7f1d1d; border-color: #b91c1c; }
      button.secondary { background: #0f141d; }
      #status { margin-top: 12px; min-height: 24px; color: #f5d547; }
      code { background: #0f141d; padding: 2px 6px; border-radius: 6px; }
      .hint { font-size: 13px; color: #9aa4b2; margin-top: 8px; }
    </style>
  </head>
  <body>
    <main>
      <h1>JB Discord Translate Settings</h1>
      <p>这里放完整设置。弹窗改常用项，这页管细活。</p>

      <section class="card grid">
        <div>
          <label for="target-language">Target language</label>
          <select id="target-language">
            <option value="zh-CN">简体中文 (zh-CN)</option>
            <option value="zh-TW">繁體中文 (zh-TW)</option>
            <option value="ja">日本語 (ja)</option>
            <option value="en">English (en)</option>
            <option value="ko">한국어 (ko)</option>
            <option value="fr">Français (fr)</option>
            <option value="de">Deutsch (de)</option>
          </select>
        </div>
        <div class="toggle-row">
          <div>
            <label for="translate-direct-messages">Translate direct messages</label>
            <p>关掉就只翻服务器频道。</p>
          </div>
          <input id="translate-direct-messages" type="checkbox" />
        </div>
      </section>

      <section class="card">
        <h2>Filters</h2>
        <p>用 whitelist/blacklist 控制哪些服务器和频道参与翻译。ID 一行一个，也可以逗号分隔。</p>
        <div class="grid">
          <div>
            <label for="server-filter-mode">Server filter mode</label>
            <select id="server-filter-mode">
              <option value="off">Off</option>
              <option value="whitelist">Whitelist</option>
              <option value="blacklist">Blacklist</option>
            </select>
            <label for="server-filter-list" style="margin-top:12px;">Server IDs</label>
            <textarea id="server-filter-list" placeholder="1234567890\n9876543210"></textarea>
          </div>
          <div>
            <label for="channel-filter-mode">Channel filter mode</label>
            <select id="channel-filter-mode">
              <option value="off">Off</option>
              <option value="whitelist">Whitelist</option>
              <option value="blacklist">Blacklist</option>
            </select>
            <label for="channel-filter-list" style="margin-top:12px;">Channel IDs</label>
            <textarea id="channel-filter-list" placeholder="1466844219166429224"></textarea>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Cache & backup</h2>
        <p>缓存存在 <code>chrome.storage.local</code> 里，默认 90 天过期。</p>
        <div class="actions">
          <button id="save-settings" class="primary" type="button">Save settings</button>
          <button id="clear-cache" class="danger" type="button">Clear translation cache</button>
          <button id="export-settings" class="secondary" type="button">Export settings & cache</button>
        </div>
        <div style="margin-top:16px;">
          <label for="import-settings-file">Import settings & cache</label>
          <input id="import-settings-file" type="file" accept="application/json" />
          <div class="hint">导入会覆盖当前设置；缓存只接受结构正确的数据。</div>
        </div>
        <div id="status" aria-live="polite"></div>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
