<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JB Discord Translate Settings</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
      }
      body {
        margin: 0;
        background: #111318;
        color: #f3f4f6;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 32px 20px 40px;
      }
      h1 { margin: 0 0 8px; font-size: 28px; }
      p { color: #c4cad6; line-height: 1.6; }
      .card {
        background: #1a1f29;
        border: 1px solid #2b3342;
        border-radius: 16px;
        padding: 20px;
        margin-top: 20px;
      }
      label { display: block; font-weight: 600; margin-bottom: 8px; }
      select, button {
        border-radius: 10px;
        border: 1px solid #3b465a;
        background: #0f141d;
        color: #f3f4f6;
        font: inherit;
      }
      select { width: 100%; padding: 10px 12px; }
      .toggle-row {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
      }
      .toggle-row input { width: 20px; height: 20px; }
      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 20px;
      }
      button { padding: 10px 14px; cursor: pointer; }
      button.primary { background: #2563eb; border-color: #2563eb; }
      button.danger { background: #7f1d1d; border-color: #b91c1c; }
      #status { margin-top: 12px; min-height: 24px; color: #f5d547; }
      code {
        background: #0f141d;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>JB Discord Translate Settings</h1>
      <p>调目标语言、控制是否翻译私信、顺手清缓存。别整那些花里胡哨的，够用最重要。</p>

      <section class="card">
        <label for="target-language">Target language</label>
        <select id="target-language">
          <option value="zh-CN">简体中文 (zh-CN)</option>
          <option value="zh-TW">繁體中文 (zh-TW)</option>
          <option value="ja">日本語 (ja)</option>
          <option value="en">English (en)</option>
          <option value="ko">한국어 (ko)</option>
          <option value="fr">Français (fr)</option>
          <option value="de">Deutsch (de)</option>
        </select>
      </section>

      <section class="card toggle-row">
        <div>
          <label for="translate-direct-messages">Translate direct messages</label>
          <p>关闭时只翻译服务器频道；打开后私信也一起翻。</p>
        </div>
        <input id="translate-direct-messages" type="checkbox" />
      </section>

      <section class="card">
        <strong>Cache</strong>
        <p>翻译缓存保存在 <code>chrome.storage.local</code>，默认 90 天过期。</p>
        <div class="actions">
          <button id="save-settings" class="primary" type="button">Save settings</button>
          <button id="clear-cache" class="danger" type="button">Clear translation cache</button>
        </div>
        <div id="status" aria-live="polite"></div>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
